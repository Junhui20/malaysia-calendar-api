name: Deploy

on:
  push:
    branches: [main]

jobs:
  api:
    name: Deploy API (Workers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @catlabtech/mycal-core build

      - name: Run tests
        run: pnpm --filter @catlabtech/mycal-core test

      - name: Validate data
        run: npx tsx scripts/validate-data.ts

      - name: Deploy to Cloudflare Workers
        working-directory: packages/api
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  web:
    name: Deploy Web (Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: |
          pnpm --filter @catlabtech/mycal-core build
          pnpm --filter @catlabtech/mycal-sdk build

      - name: Build web
        working-directory: packages/web
        run: pnpm build
        env:
          PUBLIC_API_URL: https://mycal-api.huijun00100101.workers.dev/v1

      - name: Deploy to Cloudflare Pages
        working-directory: packages/web
        run: pnpm exec wrangler pages deploy dist --project-name=mycal-web --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
